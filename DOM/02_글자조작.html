<html lang="ko">

<head>

headerBox1.textContent=outputline;

let outputline;
gowrite();
gowrite('<div id="headerBox2"></div>',0);
for(let n=0;n<10;n++) outputline+=`<h4>Header - ${n}</h4>`;
headerBox2.innerHTML=outputline;
    </textarea></li>
    <br>
    <li class="titline">.value</li>
    <li>코드보기<textarea>
let outputline;
gowrite();
gowrite('<div id="headerBox3"></div><input id="txt">',0);

headerBox3.value=outputline; //value는 form양식에만 있는 속성
