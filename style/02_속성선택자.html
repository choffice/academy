<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    [type=text] {
      background: pink;
    }

    [type=password] {
      background: yellow;
    }

    /* -으로 연결된 부분만 제외*/
    [data-role~=one] {
      font-weight:bold; //1,3,5
    }

    /* -으로 연결된 부분만 제외*/
    [data-email~=one] {
      background: red; //3,5
    }
    
    /* 3. 속성값과 완전 일치, 시작시, '-' 포함, 제외(공백, 다른글자포함) :: 1,2 */
    [data-role|='one'] {font-style:italic;}


    /* 6. 속성값과 완전 일치 또는 포함될 때 ) :: 1,2,3,4,5,6,7,8 */
    [data-role*='zero'] {color:gray;}
  </style>
</head>

<body>
  <h1>속성 선택자</h1>
  <hr>
  <ul>
    <li><input type="text"></li>
    <li><input type="password"></li>
  </ul>

  <h3>data set을 활용한 속성 선택자</h3>
  <ol>
    <li data-role="one" data-email="one@abc.com">one@abc.com</li>
    <li data-role="one-two" data-email="one-two@abc.com">one-two@abc.com</li>
    <li data-role="one two" data-email="one two@abc.com">one two@abc.com</li>
    <li data-role="onetwo" data-email="onetwo@abc.com">onetwo@abc.com</li>
    <li data-role="zero one two" data-email="zero one two@abc.com">zero one two@abc.com</li>
    <li data-role="zero-one two" data-email="zero-one two@abc.com">zero one two@abc.com</li>
    <li data-role="zero one-two" data-email="zero one-two@abc.com">zero one-two@abc.com</li>
    <li data-role="zero-one-two" data-email="zero-one-two@abc.com">zero-one-two@abc.com</li>
  </ol>
  <script src="/bunny.js"></script>
  <script src="/catchme.js"></script>
  <script src="menu.js"></script>
</body>

</html>
