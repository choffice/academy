<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
   width:300px;height:200px;
   background-color:lime;
    }
    div:hover{background-color:green;cursor:pointer;}
    div:active{background-color:red;cursor:pointer;}
  </style>
</head>

<body>
  <h1>반응 선택자</h1>
  <p><b>hover : </b>마우스가 해당 태그의 위로 올라갈 때 활성화</p>
  <p><b>active : </b>마우스가 해당 태그를 클릭할 때 활성화</p>
  <hr>
  <div>반응 선택자</div>
  <script src="/bunny.js"></script>
  <script src="menu.js"></script>
</body>

</html>
