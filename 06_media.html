<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      padding: 0;
      margin: 0;
    }

    h1 {
      color: #fff;
      text-shadow: 1vh 1vh 0vh #000;
      text-indent: 2vw;
    }

    section {
      width: 100vw;
      height: 100vh;
    }

    section>video {
      width: 100%;
      border: none;
    }
  </style>
</head>

<body>
  <section>
    <!-- 공통 속성 controls, loop, autoplay -->
    <video src="media/cat.mp4" type="video/webm" style="display:block;" controls loop autoplay></video>
  </section>
  <h1>미디어 관련 태그</h1>
  <hr>
  <audio controls loop autoplay>
    <source src="media/Kalimba.ogg" type="media/ogg">
  </audio><br>
  <script src="menu.js"></script>
</body>

</html>
