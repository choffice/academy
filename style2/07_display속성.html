<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      //margin: 0;
      //padding: 0;
      box-sizing: border-box;
      list-style: none;
    }

    fieldset {
      display: inline;
    }

    .outer {
      width: 150px;
      height: 150px;
      background: aquamarine;
    }

    .inner {
      background: blue;
      color: #fff;
    }

  </style>
</head>

<body>
  <h1>display 속성</h1>
  <p>none, inline, block, inline-block, table, table-cell, flex</p>
  <hr>
  <p>display속성과 visibility 속성의 비교</p>
  <div>
    <button type="button" style="visibility: visible;">visibility : visible(default)</button>
    <!-- 공간은 내버려두고 보이지만 않는 것 -->
    <button type="button" style="visibility: hidden;">visibility : hidden</button>
    <button type="button" style="visibility: visible;" hidden>visibility : hidden</button>
    <button type="button" style="display:inline;">display:inline</button>
    <button type="button" style="display:none;">display:none</button>
    <button type="button" style="display:inline-block;">display:inline-block</button>
    <button type="button" style="display:block;">display:block</button>
  </div>

  <fieldset>
    <legend>block 안에 inline</legend>
    <div class="outer" style="text-align: center;      line-height: 150px;">
      <span class="inner">inner</span>
      <span class="inner">inner</span>
    </div>
  </fieldset>

  <h4>block 안에 block 위치 잡기</h4>
  <fieldset>
    <legend>table 이용하기</legend>
    <table class="outer">
      <tr>
        <td style="text-align:center;">
          <div style="display:inline;" class="inner">inner</div>
        </td>
      </tr>
    </table>
  </fieldset>

  <fieldset>
    <legend>block 안에 block</legend>
    <div class="outer" style="position:relative">
      <div class="inner" style="position:absolute;top:50%;left:50%;margin-left:-30px;margin-top:-30px;">inner</div>
    </div>
  </fieldset>

   <fieldset>
    <legend>flex 활용</legend>
    <div class="outer" style="display:flex;justify-content:center;align-items:center;">
      <div class="inner">inner</div>
    </div>
  </fieldset>


  <script src="menu.js"></script>
  <script>
  </script>
</body>

</html>
