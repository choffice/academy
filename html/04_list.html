<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    ul,
    ol,
    menu {}

    li {
      font-size: 1.2vw;
    }

    ul li {
      float: left;
      margin-inline: 2%;
    }

    menu:nth-of-type(2) li::marker {
      content: "😊";
    }
  </style>
</head>

<body>
  <h1>목록 관련 태그</h1>
  <hr>
  <ul type="square" style="clear:both;">
    <!-- square, circle, disc(기본) -->
    <li>한식</li>
    <li>중식</li>
    <li>양식</li>
  </ul><br>
  <ol type="I">
    <!-- 1(기본), A, a, I, i -->
    <li>커피</li>
    <li>에이드</li>
    <li>스무디</li>
  </ol>
  <menu>
    <li>안녕</li>
    <li>hello</li>
    <li>bon jour</li>
  </menu>
  <script src="menu.js"></script>
  <script>
    let n = 0;
    let ult = 'square,circle,disc'.split(',');
    let olt = '1,A,a,I,i'.split(',');
    document.onclick = () => {
      console.log(event.target.tagName)
      if (['LI'].indexOf(event.target.tagName) > -1) {
        let wlt = olt.slice(0, olt.length);
        if (event.target.parentElement.tagName == 'UL') wlt = ult.slice(0, ult.length);
        n = wlt.indexOf(event.target.parentElement.type);
        wlt.length - 1 > n ? n++ : n = 0;
        event.target.parentElement.type = wlt[n];
      }
    }
  </script>
</body>

</html>
