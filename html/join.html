<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #numpad {
  width: 200px;
  height: 200px;
  display: flex;
  justify-content: center;
  align-content: center;
    position: fixed;
  top:5vh;
  right:30vw;
}

.nvw {
  visibility: hidden;
}

#numpad>ul {
  width: 150px;
  height:150px;
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
  align-items: center;
}

#numpad>ul li {
  width: 30%;
  height: 30%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-block: 2%;
  background: turquoise;
  box-sizing: border-box;
}

#numpad>ul li:active {
  background: paleturquoise;
  border: 3px inset;
}

input[type=number] {
  width: 4em;
}
  </style>
</head>

<body>
  <fieldset>
    <legend>회원가입</legend>
    <form action="join_conform.html" method="get">
      <label for="id">ID</label> <input type="text" name="userid" required><br>
      <label for="pw">비밀번호</label> <input type="password" name="userpw" required><br>
      <label for="id">비밀번호 확인</label> <input type="password" name="userpw" required><br>
      <label for="usermobile">휴대폰</label> <select id="usermobile">
        <option value="통신사" disabled>통신사</option>
        <option value="KT" selected>KT</option>
        <option value="SKT">SKT</option>
        <option value="LG">LG</option>
        <option value="알뜰폰">알뜰폰</option>
      </select><input id="tt" hidden disabled><br>
      <input type="number" value="010" readonly>-
      <input type="number">-
      <input type="number">
      <div id="numpad">
        <ul></ul>
      </div><br>
      <label for="email">이메일</label> <input type="text" name="usermailid">@<input type="text" name="usermailhost"><br>
      <button>가입</button>
      <a href="index.html"><input type="button" value="취소"></a>
    </form>
  </fieldset>
  <script>
    let numblank = document.querySelectorAll('[type=number]:not([readonly])');
for (let nm = 0; nm < 10; nm++) { numpad.children[0].innerHTML += '<li onclick="padtouch(this)">' + nm + '</li>'; }
numpad.children[0].innerHTML += '<li onclick="padtouch(this)">←</li>';
numpad.children[0].innerHTML += '<li onclick="padtouch(this)">C</li>';

let focusbl;
function padtouch(selpad) {
  switch(selpad.innerText){
    case '←':
    focusbl.value.length>1? focusbl.value=focusbl.value.substring(0,focusbl.value.length-1):focusbl.value='';
    break;
    case 'C':focusbl.value='';break;
    default:
  if (focusbl == numblank[0] && focusbl.value.length == 4)
    focusbl = numblank[1];
    if(focusbl.value.length < 4)
  focusbl.value = focusbl.value + selpad.innerText;
  if (focusbl == numblank[1] && focusbl.value.length >= 4) numpad.classList = 'nvw'; else focusbl.select();
  }
}

[].forEach.call(numblank, (nbl) => {
  nbl.onfocus = () => {
    focusbl = nbl;
    numpad.removeAttribute('class');
  }
  nbl.onkeydown = () => {
    if(focusbl.value.length>=4) {event.preventDefault();
    focusbl==numblank[0]?numblank[1].select():numpad.classList='nvw';}
  }
});

//init
numpad.classList = 'nvw';

  </script>
</body>

</html>
