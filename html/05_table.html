<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    table,
    th,
    td {
      font-size: 1.5vw;
      border: 1px solid black;

      /* 외곽선을 한 줄로 만든다*/
      //border-collapse: collapse;}
      table {
        width: 25vw;
      }

      th,
      td {
        text-align: center;
      }

      table:nth-of-type(2) {
        width: 40vw;
        border-collapse: collapse;
      }

      table:nth-of-type(2) th,
      table:nth-of-type(2) td,
      {
      width: 40vw;
      border-collapse: collapse;
    }

    tr:nth-of-type(2)>th:nth-of-type(1) {
      padding-bottom: 30%;
    }

    tr:nth-of-type(2)>th:nth-of-type(2) {
      padding-bottom: 60%;
    }

    tr:nth-of-type(2)>th:nth-of-type(3) {
      padding-bottom: 20%;
    }

    tr:nth-of-type(8)>th:nth-of-type(1) {
      padding-bottom: 15%;
    }

    tr:nth-of-type(7)>th:nth-of-type(1) {
      padding-bottom: 20%;
    }
  </style>
</head>

<body>
  <h1>테이블 관련 태그</h1>
  <hr>
  <table>
    <thead>
      <tr>
        <th>교시</th>
        <th>월</th>
        <th>화</th>
        <th>수</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1교시</td>
        <td>국어</td>
        <td>수학</td>
        <td rowspan="3">미술</td>
      </tr>
      <tr>
        <td>2교시</td>
        <td>한문</td>
        <td>영어</td>
      </tr>
      <tr>
        <td>3교시</td>
        <td colspan="2">음악</td>
      </tr>
    </tbody>
  </table>
  <br>
  <table>
    <tr>
      <th colspan="6">한국의 차</th>
    </tr>
    <tr>
      <th rowspan="6">뿌리차</th>
      <td>인삼차</td>
      <th rowspan="9">과일차</th>
      <td>수정과</td>
      <th rowspan="5">잎차</th>
      <td>뽕잎차</td>
    </tr>
    <tr>
      <td>당귀차</td>
      <td>유자차</td>
      <td>감잎차</td>
    </tr>
    <tr>
      <td>생강차</td>
      <td>구기자차</td>
      <td>솔잎차</td>
    </tr>
    <tr>
      <td>칡차</td>
      <td>대추차</td>
      <td>국화차</td>
    </tr>
    <tr>
      <td>둥굴레차</td>
      <td>오미자차</td>
      <td>이슬차</td>
    </tr>
    <tr>
      <td>마차</td>
      <td>매실차</td>
      <th rowspan="4">기타</th>
      <td>두충차</td>
    </tr>
    <tr>
      <th rowspan="3">곡물차</th>
      <td>보리차</td>
      <td>모과차</td>
      <td>영지버섯차</td>
    </tr>
    <tr>
      <td>옥수수차</td>
      <td>산수유차</td>
      <td>귤강차</td>
    </tr>
    <tr>
      <td>현미차</td>
      <td>탱자차</td>
      <td>쌍화차</td>
    </tr>
  </table>
  <br>
  <script src="menu.js"></script>
</body>

</html>
