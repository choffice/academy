<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    hr~* {
      margin: 5px;
    }

    /*span의 margin은 좌우는 적용, 상하는 미적용*/
    /*width, height도 미적용*/
    span {
      width: 300px;
      height: 100px;
      background: yellow;
      margin: 10px;
    }

    div {
      width: 300px;
      height: 100px;
      background: skyblue;
    }
  </style>
</head>

<body>
  <h1>공간 관련 태그</h1>
  <hr>
  <div>DIV는 BLOCK</div>
  <div>BLOCK</div>
  <span>SPAN은</span> <span>INLINE</span>
<br>
<br>
  <table>
<tr><th>블록요소 :</th><td>h1~h6, p, pre, blockquote, ul, ol, li, div, ...</td></tr>
<tr><th>인라인요소 :</th><td>img, a, audio, video, span, ...</td></tr>
  </table>
  <script src="menu.js"></script>
</body>

</html>
