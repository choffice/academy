<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <!-- viewport : 화면 반응을 하게 해주는 부분 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /*
*{margin:0;padding:0;box-sizing:border-box;list-style:none;}
*/
    body {
      transition-duration: .3s;
    }

    @media screen {
      body {
        background: greenyellow;
      }
    }

    @media print {
      body {
        background: red;
      }
    }

    @media (max-width: 600px) {
      body {
        background: skyblue;
      }
    }

    hr~* {
      font-size: 12pt;
    }

.flexset:is(main, article, figure){
  display:flex;
justify-content: center;
align-content: center;
}

    #container {
      width: 80%;
      background: gray;
      display:flex;
      flex-wrap:wrap;
      justify-content: space-around;
      align-content:stretch;
    }

    header {
      width: 100%;
      background: salmon;
    }

    nav {
      width: 100%;
      background: dodgerblue;
    }

    aside {
      width: 20%;
      background: yellow;
    }

    main {
      width: 70%;
      background: teal;
    }

    article {
      width: 80%;
      background: gold;
    }

    figure {
      width: 80%;
      background: orchid;
    }

    section {
      width: 100%;
      background: purple;
    }

    footer {
      width: 100%;
      background: navy;
    }
  </style>
</head>

<body>
  <h1>반응형 웹</h1>
  <p>화면 크기에 따라 자동으로 변화되는 방식</p>
  <p>viewport 메타 태그, flex, @media</p>
  <hr>
  <div id="container">
    <header>header</header>
    <nav>nav</nav>
    <aside>aside</aside>
    <main class="flexset">main
      <article class="flexset">article
        <figure class="flexset">정부는 회계연도마다 예산안을 편성하여 회계연도 개시 90일전까지 국회에 제출하고, 국회는 회계연도 개시 30일전까지 이를 의결하여야 한다. 대법원장의 임기는 6년으로 하며, 중임할 수
          없다.
          국회의 정기회는 법률이 정하는 바에 의하여 매년 1회 집회되며, 국회의 임시회는 대통령 또는 국회재적의원 4분의 1 이상의 요구에 의하여 집회된다. 국무위원은 국무총리의 제청으로 대통령이 임명한다.
          연소자의 근로는 특별한 보호를 받는다. 국무총리 또는 행정각부의 장은 소관사무에 관하여 법률이나 대통령령의 위임 또는 직권으로 총리령 또는 부령을 발할 수 있다. 타인의 범죄행위로 인하여
          생명·신체에
          대한 피해를 받은 국민은 법률이 정하는 바에 의하여 국가로부터 구조를 받을 수 있다.</figure>
      </article>
    </main>
    <section>section</section>
    <footer>footer</footer>
  </div>
  <script src="menu.js"></script>
  <script>
  </script>
</body>

</html>
