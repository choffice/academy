<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      list-style: none;
    }

    h1:first-letter {
      font-variant: small-caps;
      font-size: 2em;
    }

    @keyframes changeEffect {
      from {
        left: 0;
      }

      to {

        left: calc(100vw - 100px);
      }
    }

    .box {
      width: 100px;
      height: 100px;
      background: skyblue;
      position: relative;
      animation: changeEffect 2s infinite alternate linear;
      border-radius: 50%;
    }

    .box:active {
      background: red;
      clip-path: polygon(50% 0%, 64% 31%, 98% 35%, 75% 59%, 79% 91%, 50% 73%, 21% 91%, 21% 59%, 2% 35%, 36% 28%);
              transform: rotateY(360deg);
              transition-duration: .5s;
    }
  </style>
</head>

<body>
  <h1>animation 효과</h1>
  <hr>
  <p>@keyframes, from {} to {} 활용</p>
  <div class="box"></div>
  <script src="menu.js"></script>
  <script src="/bunny.js"></script>
  <script>
  </script>
</body>

</html>
