<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite" />
  <style>
    body * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      list-style: none;
    }

    h1:first-letter {
      font-variant: small-caps;
      font-size: 2em;
    }

    .material-symbols-outlined {
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 48
    }

    .btn {
      margin: 10vh 30vw;
      padding: 15px 30px;
      background: red;
      color: #fff;
      transition: all .3s ease;
      cursor: pointer;
    }

    h1:hover~.btn {
      background: red;
      transform: scale(3);
      font-variation-settings:
        'FILL' 1,
        'wght' 400,
        'GRAD' 0,
        'opsz' 48;
        color:red;
      background: transparent;
    }
  </style>
</head>

<body>
  <h1>animation 효과</h1>
  <hr>
  <p>transition 활용</p>
  <span class="material-symbols-outlined btn">
    favorite
  </span>
  <script src="menu.js"></script>
  <script>
  </script>
</body>

</html>
