<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <form action="login.html">
    <fieldset>
      <h2>가입이 완료되었습니다</h2>
      <button>로그인하기</button>
    </fieldset>
  </form>
  <script>
    let tit;
    location.href.includes('id=') ?
      tit = location.href.split('id=')[1].split('&')[0] :
      tit = location.href.split('name=')[1].split('&')[0];
    tit = decodeURIComponent(tit);
    document.querySelector('h2').innerHTML = tit +'님, ' + document.querySelector('h2').innerHTML;
  </script>
</body>

</html>
