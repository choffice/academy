<!DOCTYPE html>
<HTML lang="ko">
<META charset="UTF-8">

<HEAD>
  <TITLE>경유페이지</TITLE>
  <STYLE>
    body * {
      box-sizing: border-box;
    }

    section {
      transform-style: preserve-3d;
      perspective: 400px;
      margin: 0 auto;
      display: flex;
      width: 90vw;
      height: 100vh;
      justify-content: space-around;
      align-items: center;
      transition-duration: .8s;
    }

    H1 {
      color: #fff;
    }

    a {
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      width: 200px;
      height: 200px;
      margin-block: 5%;
    }

    a:nth-of-type(1) {
      background: salmon;
    }

    a:nth-of-type(2) {
      background: cadetblue;
    }

    a:nth-of-type(4) {
      background: cornflowerblue;
    }

    a:nth-of-type(5) {
      background: gold;
    }

    a:nth-of-type(6) {
      background: plum;
    }

    a:hover {
      filter: invert(1);
      box-shadow: 1em 1em 0 lightgray;
      //transform: translate(-1em, -1em);
      //transition-duration: .5s;
    }

    a:nth-of-type(3) {
      display: none;
      flex-direction: column;
      padding: 3% 0 10% 5%;
      justify-content: space-between;
      color: transparent;
    }

    a:nth-of-type(3):hover {
      box-shadow: 1em 1em 0 lightgray inset, 0 -1em 0 lightgray inset;
      transform: translate(0);
      color: greenyellow;
    }

    a:nth-of-type(3)>span {
      width: 100%;
      font-size: 1.5em;
      font-weight: bold;
    }

    a:nth-of-type(3)>sub {
      width: 100%;
      text-align: right;
      font-size: 2em;
      font-style: italic;
    }

    @media only screen and (max-width:900px) {
      a:nth-of-type(3) {
        display: flex;
      }

      section {
        margin: 10vh auto;
        flex-wrap: wrap;
        width: 70vw;
        height: 0vh;
        align-content: space-around;
      }
    }
  </STYLE>
</HEAD>

<BODY>
  <section id="menuset">
    <a href="html/index.html">
      <h1>HTML</h1>
    </a>
    <a href="style/index.html">
      <h1>CSS 선택자</h1>
    </a>
    <a href="">
    </a>
    <a href="style2/index.html">
      <h1>CSS 속성</h1>
    </a>
    <a href="style3/index.html">
      <h1>CSS 모션</h1>
    </a>
    <a href="js/index.html">
      <h1>JS</h1>
    </a>
  </section>
  <script>
    let ndate = new Date(); document.querySelector('a:nth-of-type(3)').innerHTML = '<span>' + ndate.toString().split(' ')[3] + '<br>' + ndate.toString().split(' ')[1] + '<br>' + ndate.toString().split(' ')[2] + '</span><sub>' + ndate.toString().split(' ')[0] + '</sub>';

    //현재 메뉴 총 6개 간격은 24deg, 범위는 30~170 
    let init_deg = [30,54,78,102,126,170];
    for (let a_menuset in init_deg) {
      menuset.children[a_menuset].style.transform = `rotateY(${init_deg[a_menuset]}deg)`;
    }

    let firstmove = [0, 0];
    menuset.onmousemove = dmouse => {
      let mousedir = 'center';
      //마우스 감도 조절 5
      if (Math.abs(firstmove[0] - dmouse.clientX) >= 1) {
        if (firstmove[0] - dmouse.clientX < 0) mousedir = 'right';
        else if (firstmove[0] - dmouse.clientX > 0) mousedir = 'left';
      }
      //회전각 조절 .1
      let rotategap = dmouse.clientX * .1;
      if (Math.abs(rotategap) >= 70) rotategap = String(rotategap).replace(Math.abs(rotategap), 70);
      switch (mousedir) {
        case 'left':
          menuset.style.transform = `rotateY(${rotategap}deg)`;
          for (let a_menuset in init_deg) {
      menuset.children[a_menuset].style.transform = `rotateY(${parseInt(menuset.children[a_menuset].style.transform.replace('rotateY(',''))}deg)`;
    }
          break;
        case 'right':
          menuset.style.transform = `rotateY(${rotategap}deg)`;
          break;
      }
      firstmove = [dmouse.clientX, dmouse.clientY];
    }

  </script>
</BODY>

</HTML>
