<!DOCTYPE html>
<HTML lang="ko">
<META charset="UTF-8">
<HEAD>
<TITLE>경유페이지</TITLE>
<STYLE>
  body{display:flex;justify-content: space-around;align-items: center;height:100vh;}
H1{
  color:#fff;
}
a{
  display: flex;
  justify-content: center;
  align-items:center;
text-decoration: none;
width:15vw;
height:15vw;
}
a:nth-of-type(1){background:salmon;}
a:nth-of-type(2){background:cadetblue;}
a:nth-of-type(3){background:cornflowerblue;}
a:nth-of-type(4){background:gold;}
a:nth-of-type(5){background:plum;}
a:hover{filter:invert(1);box-shadow:1em 1em 0 lightgray;transform:translate(-1em,-1em);transition-duration:.5s;}
</STYLE>
</HEAD>
