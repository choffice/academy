<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
  </style>
</head>

<body>
  <h1>입력양식 태그</h1>
  <hr>
  <form action="index.html" method="get">
    <fieldset>
      <legend>입력양식 태그 종류</legend>
      <label for="name">이름 &nbsp;</label><input type="text" name="name" placeholder="한글로입력" id="name" required>
      <label for="male">남</label>
      <input type="radio" value="1" name="gender" id="male" checked>
      <label for="female">여</label>
      <input type="radio" value="2" name="gender" id="female">
      <br><label for="pw">암호 </label><input type="password" name="pw" id="pw" placeholder="숫자 6자리 입력" disabled>
      <br><label for="mail">암호 </label><input type="email" name="email" id="mail" placeholder="user@mail.com">
      <a href="index.html/index.html?news=naver">뉴스제출</a><br>
      <label for="game">게임</label><input type="checkbox" id="game" name="hobby" value="game">
      <label for="boxing">복싱</label><input type="checkbox" id="boxing" name="hobby" value="boxing">
      <label for="sing">노래</label><input type="checkbox" id="sing" name="hobby" value="sing">
      <input type="range" min="0" max="2" step="1" value="1">
      <label for="mobile">휴대폰</label>
      <select name="mobile" id="mobile">
        <option value="통신사" disabled>통신사를 선택하세요</option>
        <option value="kt" selected>kt</option>
        <option value="skt">skt</option>
        <option value="lg">lg</option>
      </select>
      <input type="text" name="mobile01" value="010" readonly>-
      <input type="text" name="mobile02">-
      <input type="text" name="mobile03"><br>
      <label for="bigo">비고</label>
      <textarea name="bigo" id="bigo"></textarea><br>
      <label for="date">날짜 </label><input type="date" id="date"><br>
      <label for="time">시간 </label><input type="time" id="time">
      <input type="color">
      <input type="hidden" name="key" value="ekljtlsjlth">
      <input type="file" name="file">
    </fieldset>
    <input type="submit" value="저장 submit">
    <input type="button" value="저장 button">
    <button>button submit</button>
  </form>
  <!-- form 밖에 있으면 안 된다 -->
  <input type="text" name="etc" id="etc" placeholder="이건 전송 안 된다">
  <script src="bunny.js"></script>
  <script src="menu.js"></script>
  <script>
    let rgs = document.querySelector('[type=range]');
    rgs.oninput = () => {
      for (d of document.querySelectorAll('[type=checkbox]')) { d.checked = false; }
      document.querySelectorAll('[type=checkbox]')[parseInt(rgs.value)].checked = true;
    }
  </script>
</body>

</html>
